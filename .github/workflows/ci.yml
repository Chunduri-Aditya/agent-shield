name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-shield

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: agent-shield

      - name: Checkout inspect_evals dependency
        uses: actions/checkout@v6
        with:
          repository: UKGovernmentBEIS/inspect_evals
          path: inspect_evals

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .
